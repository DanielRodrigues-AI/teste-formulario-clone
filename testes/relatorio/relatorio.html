<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório de Perfil Comportamental - DISC</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 p-6">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md border border-slate-100 p-8">
        <header class="border-b border-slate-100 pb-6 mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Análise de Perfil Comportamental</h1>
            <p class="text-sm text-slate-500 mt-1">Metodologia DISC — PSICO Corporation</p>
        </header>

        <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-lg mb-6">
            <div>
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Cliente</span>
                <p id="rep-client-name" class="font-bold text-slate-800">-</p>
            </div>
            <div>
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Tipo de Avaliação</span>
                <p id="rep-test-name" class="font-medium text-slate-600">-</p>
            </div>
        </div>

        <section>
            <h2 class="text-lg font-bold text-slate-900 mb-4">Pontuação por Vetor</h2>
            
            <div class="space-y-4" id="results-bars-container">
                <p class="text-sm text-slate-400">Carregando resultados...</p>
            </div>
        </section>

        <footer class="mt-8 pt-6 border-t border-slate-100 text-center">
            <button onclick="window.close()" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-bold rounded-lg transition-colors">
                Fechar Relatório
            </button>
        </footer>
    </div>

    <script src="relatorio-script.js"></script>
</body>
</html>
